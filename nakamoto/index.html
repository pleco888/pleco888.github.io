<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAKAMOTO's | 戦略デザイン</title>

<!-- Google Fonts -->

<style>

@import url('https://fonts.googleapis.com/css2?family=Nabla:EDPT,EHLT@113,7&display=swap');

.poppins-bold {
  font-family: "Poppins", sans-serif;
  font-weight: 700;
  font-style: normal;
}


:root {
  --main: #1CA39A;
  --dark: #167F78;
  --light: #f7f9f9;
  --text: #333;
  --gray: #e5e5e5;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  line-height: 1.7;
}

/*h1, h2, h3 {
  font-family: 'Montserrat', sans-serif;
}*/

.container {
  width: 90%;
  max-width: 1200px;
  margin: auto;
}

section {
  padding: 80px 0;
}

/* Header */

header {
  background: white;
  padding: 20px 0;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav ul {
  display: flex;
  list-style: none;
  gap: 30px;
}

.nav a {
  text-decoration: none;
  color: var(--text);
  font-weight: 500;
}

.btn {
  background: var(--main);
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  text-decoration: none;
  transition: .3s;
}

.btn:hover {
  background: var(--dark);
}

/* Hero */

.hero {
  background: linear-gradient(135deg, var(--main), var(--dark));
  color: white;
  padding-top: 140px;
  padding-bottom: 120px;
}

.hero-content {
  display: flex;
  align-items: center;
  gap: 60px;
}

.hero-text {
  flex: 1;
}

.hero-text h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

.hero-text p {
  margin-bottom: 30px;
  font-size: 18px;
}

.hero img {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

/* about */

.about-grid {
  display: grid;
  grid-template-columns: repeat( 1, 1fr);
  gap: 30px;
  margin-top: 40px;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
  transition: .3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* news */

.news {
  background: var(--light);
}

.news-content {
  display: flex;
  gap: 60px;
  align-items: center;
}

.news ul {
  list-style: none;
}

.news li {
  margin-bottom: 15px;
}

/* Performance */

.performance {
  background: white;
}

.performance-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  text-align: center;
  gap: 40px;
  margin-top: 40px;
}

.performance h3 {
  font-size: 40px;
  color: var(--main);
}

/* Philosophy */

.philosophy {
  background: linear-gradient(135deg, var(--main), var(--dark));
  color: white;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

/* contact */

.contact-table {
  margin-top: 40px;
  width: 100%;
  border-collapse: collapse;
}

.contact-table th,
.contact-table td {
  border-bottom: 1px solid var(--gray);
  padding: 15px;
  text-align: left;
}

/* Contact */

.contact {
  text-align: center;
  background: var(--light);
}

/* Footer */

footer {
  background: #0f4f4b;
  color: white;
  text-align: center;
  padding: 30px 0;
  font-size: 14px;
}

/* Responsive */

@media (max-width: 1024px) {

  .hero-content,
  .news-content {
    flex-direction: column;
  }

  .about-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .performance-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 768px) {

  .nav ul {
    display: none;
  }

  .about-grid {
    grid-template-columns: 1fr;
  }

  .hero-text h1 {
    font-size: 28px;
  }
}
</style>
</head>
