<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAKAMOTO's | 戦略デザイン</title>

<style>
/* -------------------------
   HERO
------------------------- */

.hero {
  position: relative;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;

  background:
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.3), transparent 50%),
    linear-gradient(135deg,#0d8f89,#3aa6a0);
  overflow: hidden;
}


/* ノイズ感 */

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
  url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.25;
}


/* 下の曲線 */

.hero::after{
  content:"";
  position:absolute;
  bottom:-1px;
  left:0;
  width:100%;
  height:160px;
  background:white;
  clip-path: ellipse(120% 100% at 50% 100%);
}



/* コンテンツ */

.hero-inner{
  position:relative;
  z-index:2;
}



/* ロゴ */

.hero-logo{
  width:160px;
  margin-bottom:25px;
}



/* メインコピー */

.hero h1{
  font-size:42px;
  font-weight:600;
  margin-bottom:20px;
}



/* サブコピー */

.hero-sub{
  font-size:18px;
  opacity:0.9;
  margin-bottom:35px;
}



/* ボタン */

.hero-btn{
  display:inline-block;
  background:#1c6f6a;
  padding:14px 36px;
  border-radius:40px;
  color:white;
  text-decoration:none;
  font-size:16px;
  transition:0.3s;
}

.hero-btn:hover{
  background:#145e5a;
}
</style>
</head>

<body>

<section class="hero">

  <div class="hero-inner">

    <img src="logo.png" class="hero-logo" alt="NAKAMOTO's">

    <h1>今ある価値を、正しく届ける。</h1>

    <p class="hero-sub">
      一瞬の魅力ではなく、納得して選ばれる体験を<br>
      ECで実現します。
    </p>

    <a href="#" class="hero-btn">無料相談はこちら</a>

  </div>

</section>

</body>
</html>
